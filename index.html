<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Taxi - Calculador de Tarifa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            text-align: center;
            margin-top: 0;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #ffc107;
            color: black;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #e0a800;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 6px;
            border-left: 5px solid #ffc107;
        }
        .precio {
            font-size: 24px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PreetyTaxi - Calculador</h2>
    <p style="font-size: 14px; color: #666; text-align: center;">Tarifa: $1.50 base + $0.50 por Km (Redondeado a cuartos)</p>
    
    <p>📍 <strong>Tu Ubicación:</strong> <span id="estado-gps" style="color: red;">Buscando GPS...</span></p>
    
    <label for="destino">Destino del Cliente:</label>
    <input type="text" id="destino" placeholder="Ej: Multiplaza, Ciudad de Panamá">
    
    <button onclick="calcularRuta()">Calcular Tarifa de Viaje</button>

    <div class="resultado" id="resultado" style="display: none;">
        <p>🛣️ <strong>Distancia:</strong> <span id="distancia">-</span></p>
        <p>⏱️ <strong>Tiempo estimado:</strong> <span id="tiempo">-</span></p>
        <hr style="border: 0; border-top: 1px solid #ccc;">
        <p>💵 <strong style="font-size: 18px;">Tarifa estimada:</strong> <br><span class="precio" id="tarifa">$0.00</span></p>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg&libraries=places"></script>

<script>
    let miUbicacion = null;

    // 1. Obtener coordenadas del GPS del teléfono inmediatamente al abrir la app
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                miUbicacion = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                document.getElementById('estado-gps').innerText = "✅ Detectada con éxito";
                document.getElementById('estado-gps').style.color = "green";
            },
            (error) => {
                document.getElementById('estado-gps').innerText = "❌ Error. Activa el GPS de tu cel.";
                alert("Por favor, asegúrate de tener el GPS activado y dar permisos de ubicación.");
            }
        );
    } else {
        alert("Tu navegador o dispositivo no soporta geolocalización.");
    }

    // 2. Función para redondear el costo a los cuartos más cercanos (.00, .25, .50, .75)
    function calcularTarifaRedondeada(distanciaKm) {
        const tarifaBase = 1.50;
        const precioPorKm = 0.50;

        // Costo bruto real
        const costoBruto = tarifaBase + (distanciaKm * precioPorKm);

        // Truco matemático para redondear a múltiplos de 0.25
        const costoRedondeado = Math.round(costoBruto * 4) / 4;

        // Retornar con formato de dos decimales estables
        return costoRedondeado.toFixed(2);
    }

    // 3. Procesar la ruta y calcular distancias reales en calle
    function calcularRuta() {
        const destinoTexto = document.getElementById('destino').value;

        if (!miUbicacion) {
            alert("Espera a que el GPS detecte tu ubicación actual.");
            return;
        }
        if (!destinoTexto) {
            alert("Por favor, introduce a dónde va el cliente.");
            return;
        }

        const directionsService = new google.maps.DirectionsService();

        const solicitud = {
            origin: miUbicacion, 
            destination: destinoTexto, 
            travelMode: google.maps.TravelMode.DRIVING 
        };

        directionsService.route(solicitud, function(resultado, estado) {
            if (estado === google.maps.DirectionsStatus.OK) {
                const ruta = resultado.routes[0].legs[0];
                
                // Extraer kilómetros (Google nos da metros, dividimos entre 1000)
                const kilometros = ruta.distance.value / 1000;
                
                // Calcular tarifa exacta usando nuestra función matemática
                const precioFinal = calcularTarifaRedondeada(kilometros);

                // Mostrar los datos en la interfaz
                document.getElementById('distancia').innerText = ruta.distance.text; // Ej: "8.4 km"
                document.getElementById('tiempo').innerText = ruta.duration.text;   // Ej: "15 min"
                document.getElementById('tarifa').innerText = "$" + precioFinal;     // Ej: "$5.75"
                
                document.getElementById('resultado').style.display = 'block';
            } else {
                alert("No se pudo encontrar una ruta por calle hacia ese destino. Intenta escribirlo de forma más específica.");
            }
        });
    }

    // 4. Activar el autocompletado inteligente en el cuadro de texto del destino
    window.onload = function() {
        const input = document.getElementById('destino');
        new google.maps.places.Autocomplete(input);
    };
</script>

</body>
</html>
